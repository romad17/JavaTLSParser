<!DOCTYPE HTML>
<html lang="en">
<head>
	<script src="https://raw.githubusercontent.com/nodeca/pako/master/dist/pako.js"></script>
	<style>
th {
	text-align: center;
	border: 1px solid white;
}
td {
  border: 1px solid white;
  word-wrap:break-word;
}
table {
	table-layout: fixed;
	width: 100%;
	border: 1px solid white;
	border-collapse: collapse;
	font-family: monospace;
	padding: 2px;
}
</style>
	<title>Java TLS Debug Log Parser</title>
</head> 

<body style = "text-align:left;background-color:#202020;color:white;" id = "body"> 
<div style="text-align: center;"><div id="space"><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br><br></div><h3>Load your log file:</h3>
<input type="file" id="file-input" /></div>
<div id="file-content"><p id="afterend"></p></div>
<!-- <pre id="file-content"></pre> -->

<script>

function myFunction(col) {
  // Declare variables
	let input, filter, table, tr, td, i, txtValue;
	input = document.getElementById("myInput"+col);
  filter = input.value.toUpperCase();
  table = document.getElementById("myTable");
  tr = table.getElementsByTagName("tr");

  // Loop through all table rows, and hide those who don't match the search query
  for (i = 0; i < tr.length; i++) {
    td = tr[i].getElementsByTagName("td")[col];
    if (td) {
      txtValue = td.textContent || td.innerText;
      if (txtValue.toUpperCase().indexOf(filter) > -1) {
        tr[i].style.display = "";
      } else {
        tr[i].style.display = "none";
      }
    }
  }
}

function sortTable(col) {
	let table, rows, switching, i, x, y, shouldSwitch;
	table = document.getElementById("myTable");
  switching = true;
  /*Make a loop that will continue until
  no switching has been done:*/
  while (switching) {
    //start by saying: no switching is done:
    switching = false;
    rows = table.rows;
    /*Loop through all table rows (except the
    first, which contains table headers):*/
    for (i = 1; i < (rows.length - 1); i++) {
      //start by saying there should be no switching:
      shouldSwitch = false;
      /*Get the two elements you want to compare,
      one from current row and one from the next:*/
      x = rows[i].getElementsByTagName("TD")[col];
      y = rows[i + 1].getElementsByTagName("TD")[col];
      //check if the two rows should switch place:
      if (x.innerHTML.toLowerCase() > y.innerHTML.toLowerCase()) {
        //if so, mark as a switch and break the loop:
        shouldSwitch = true;
        break;
      }
    }
    if (shouldSwitch) {
      /*If a switch has been marked, make the switch
      and mark that a switch has been done:*/
      rows[i].parentNode.insertBefore(rows[i + 1], rows[i]);
      switching = true;
    }
  }
}

function readSingleFile(e) {
	const file = e.target.files[0];
	if (!file) {return;}
	const reader = new FileReader();
	reader.onload = function(e) {
		const contents = e.target.result;
		displayContents(contents);
	};
	reader.readAsText(file);
}

function displayContents(contents) {
	document.getElementById('space').style.display = "none";
	const element = document.getElementById('file-content');
	let out = '<table id="myTable">\
					<thead>\
						<tr>\
							<th style="width:200px">Time      <br><button onclick="sortTable(0)">Sort</button><br><input type="text" id="myInput0" onkeyup="myFunction(0)" placeholder="Filter" style="width:180px"></th>\
							<th style="width:200px">Thread    <br><button onclick="sortTable(1)">Sort</button><br><input type="text" id="myInput1" onkeyup="myFunction(1)" placeholder="Filter" style="width:180px"></th>\
							<th style="width:50px" >Thrd_ID   <br><button onclick="sortTable(2)">Sort</button><br><input type="text" id="myInput2" onkeyup="myFunction(2)" placeholder="Filter" style="width:40px"></th>\
							<th style="width:50px" >Level     <br><button onclick="sortTable(3)">Sort</button><br><input type="text" id="myInput3" onkeyup="myFunction(3)" placeholder="Filter" style="width:40px"></th>\
							<th style="width:60px" >I/O       <br><button onclick="sortTable(4)">Sort</button><br><input type="text" id="myInput4" onkeyup="myFunction(4)" placeholder="Filter" style="width:50px"></th>\
							<th style="width:200px">Host      <br><button onclick="sortTable(5)">Sort</button><br><input type="text" id="myInput5" onkeyup="myFunction(5)" placeholder="Filter" style="width:180px"></th>\
							<th                    >Content   <br><button onclick="sortTable(6)">Sort</button><br><input type="text" id="myInput6" onkeyup="myFunction(6)" placeholder="Filter"></th>\
						</tr>\
					</thead>\
					<tbody>';
	let hexes = [];
	let pkt = '';
	let time = '';
	let thread = '';
	let thrdID = '';
	let level = '';
	let io = '';
	let host = '';
	let charac = '';
	let tr_style = '';
	const lines = contents.replace('\r\n', '\n').split('\n');
	for(let line = 0; line < lines.length; line++){
		//console.log('line: ' + line);
		if ((lines[line].includes('laintext before ENCRYPTION (') || lines[line].includes('laintext after DECRYPTION ('))) {
			time   = lines[line].split('|')[4];
			thread = lines[line].split('|')[3];
			thrdID = lines[line].split('|')[2].replace(' ','');
			level  = lines[line].split('|')[1];
			//pkt=pkt + '<tr><td>' + lines[line].split('|')[3] + '</td><td>' + lines[line].split('|')[2].replace(' ','') + '</td><td>' + lines[line].split('|')[1] + '</td><td>';
			if (lines[line].includes('laintext before ENCRYPTION (')) {io = 'SENDING';tr_style=" style='background-color:#000040' "}
			if (lines[line].includes('laintext after DECRYPTION (' )) {io = 'RECVING';tr_style=" style='background-color:#400000' "}
			//console.log("line[" + line + "]: " + lines[line]);
			line++;
			//console.log("line[" + line + "]: " + lines[line]);
			while (lines[line].length>3) {
				//console.log("lines[" + line + "]: " + lines[line]);
				hexes = hexes.concat(lines[line].substring(8, 57).replace('   ',' ').split(' '));
				//console.log('htc: ' + htc);
				//console.log('out: ' + out);
				//console.log("hexes: " + hexes);
				line++;
			}
			for(let hx = 0; hx < hexes.length; hx++){
				switch(hexes[hx]) {
					case '0A': charac = ''; break;
					case '0D': charac = '<br>\r\n'; break;
					case '3C': if (hexes[hx+1]!=='2F') charac = '<br>\r\n&lt;'; else charac = '&lt;'; break;//<
					case '3E': charac = '&gt;'; break;//>
					default  : charac = String.fromCharCode(parseInt(hexes[hx],16));
				}
				//console.log("hexes[" + hx + "]: " + hexes[hx] + " | charac: " + charac);
				pkt=pkt+charac;
				
				//console.log('htc length: ' + htc.length);
			}
			//console.log('pkt: ' + pkt);
			//out=out + pkt + '</td></tr>\n';
		//pkt=pkt.replace("<","&lt;").replace(">","&gt;").replace('"',"&quot;").replace("&","&amp;");
		//console.log("pkt: " + pkt);
		if (pkt.includes('Host: ')) host=pkt.split('Host: ')[1].split('<br>')[0];
		out = out + '<tr' + tr_style + '><td style="width=3000px">' + time + '</td><td>' + thread + '</td><td>' + thrdID + '</td><td>' + level + '</td><td>' + io + '</td><td>' + host + '</td><td>'  + pkt + '</td></tr>\n';
		time   = '';
		thread = '';
		thrdID = '';
		level  = '';
		io     = '';
		host   = '';
		pkt    = '';
		hexes  = [];
		}
    }
	element.innerHTML = out + "</tbody></table>";
}

document.getElementById('file-input')
  .addEventListener('change', readSingleFile, false);
	</script> 
</body> 
</html>
